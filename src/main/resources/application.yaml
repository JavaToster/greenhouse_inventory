server:
  port: ${INVENTORY_SERVER_PORT}

spring:
  config:
    import: optional:file:../.env
  application:
    name: inventory

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${INVENTORY_SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true
        jdbc:
          batch_size: 20
          generate_statistics: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      jedis:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
      timeout: 60000

  mvc:
    hidden:
      method:
        filter:
          enabled: true

  security:
    jwt:
      secret: ${SECURITY_JWT}
    devices:
      secret:
        encryption:
          key: ${DEVICE_SECRET_ENCRYPT_KEY}
          algorithm: ${DEVICE_SECRET_ENCRYPT_ALGORITHM}
          iv-length-bytes: ${DEVICE_SECRET_ENCRYPT_IV_LENGTH_BYTES}
          tag-length-bits: ${DEVICE_SECRET_ENCRYPT_TAG_LENGTH_BITS}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  cloud:
    openfeign:
      client:
        config:
          auth-user-service:
            connectTimeout: 2000
            readTimeout: 3000
          default:
            connectTimeout: 5000
            readTimeout: 5000

app:
  clients:
    user:
      url: ${CLIENTS_USER}